<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1280px;
      height: 640px;
      background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #21262d 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    }
    .logo { width: 200px; height: 200px; margin-bottom: 2rem; }
    h1 { font-size: 72px; color: #f0f6fc; font-weight: 700; margin-bottom: 1rem; }
    p { font-size: 32px; color: #8b949e; }
  </style>
</head>
<body>
  <img class="logo" src="assets/logo-original.png" alt="HEX Luthor">
  <h1>HEX Luthor</h1>
  <p>Seamless, borderless backgrounds for GitHub</p>
</body>
</html>
